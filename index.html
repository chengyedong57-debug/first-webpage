
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>致我最爱的女孩 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #fff0f5; /* 浪漫的淡紫粉色背景 */
            font-family: 'Noto Serif SC', serif;
            color: #5a3d46;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #e84393;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(232, 67, 147, 0.2);
        }

        .message {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 40px;
            text-align: left;
            padding: 20px;
            background: #ffeaa7;
            border-radius: 15px;
            border-left: 5px solid #fdcb6e;
            color: #2d3436;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .photo-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            width: calc(50% - 30px);
            min-width: 250px;
        }

        .photo-card:hover {
            transform: scale(1.05); /* 鼠标悬浮时微微放大 */
        }

        .photo-card img {
            width: 100%;
            border-radius: 5px;
            display: block;
        }

        .caption {
            margin-top: 10px;
            font-size: 0.9em;
            color: #636e72;
            font-weight: bold;
        }

        /* 飘落爱心背景动画 */
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .heart {
            position: absolute;
            color: #ff7675;
            font-size: 20px;
            animation: floatDown 10s linear infinite;
            opacity: 0.6;
        }
        @keyframes floatDown {
            0% { transform: translateY(-10vh) scale(0); opacity: 0; }
            20% { opacity: 0.8; transform: translateY(10vh) scale(1); }
            100% { transform: translateY(110vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- 飘落的爱心背景 -->
    <div class="hearts">
        <div class="heart" style="left: 10%; animation-delay: 0s;">💖</div>
        <div class="heart" style="left: 30%; animation-delay: 2s;">✨</div>
        <div class="heart" style="left: 50%; animation-delay: 4s;">💖</div>
        <div class="heart" style="left: 70%; animation-delay: 1s;">💕</div>
        <div class="heart" style="left: 90%; animation-delay: 3s;">💖</div>
    </div>

    <div class="container">
        <h1>致我最爱的女孩 💖</h1>
        
        <div class="message">
            
亲爱的，<br><br>
很高兴能与你相遇。在这个特别的日子里，想用一种特别的方式把我们的回忆记录下来。<br><br>
感谢你出现在我的生命里，每一天因为你而变得格外闪耀。无论未来怎样，我都想牵着你的手一起走下去。<br><br>
永远爱你的，[你的名字]

        </div>

        <div class="gallery">
            <div class="photo-card">
                <!-- 这里读取你在 Colab 上传的照片 -->
                <img src="photo1.jpg" alt="照片1">
                <div class="caption">第一次的旅行 ✈️</div>
            </div>
            <div class="photo-card">
                <img src="photo2.jpg" alt="照片2">
                <div class="caption">最开心的瞬间 😊</div>
            </div>
        </div>
    </div>

</body>
</html>
